<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TV Show Project | Hayriye Saricicek (mshayriyesaricicek)</title>
    <link href="style.css" rel="stylesheet" />
    <link rel="icon" href="/favicon.ico" type="image/x-icon" />
  </head>

  <body>
    <main>
      <p id="header">TV Show Project</p>
      <!-- Show search -->
      <input
        type="text"
        id="showSearchInput"
        placeholder="Search shows"
        aria-label="Search shows"
      />
     

      <!-- Episode search -->
      <input
        type="text"
        id="episodeSearchInput"
        placeholder="Search episodes"
        aria-label="Search episodes"
      />
      
      <label for="episodeSelect">Select episode:</label>
      <select id="episodeSelect"></select>
      <label for="showSelect">Select show:</label>
      <select id="showSelect"></select>
      <button id="clearFilters">Clear Filters</button>
      <button id="backToShows">Back to Shows</button>
      <p id="episode-count"></p>
      <p id="helperMessage"></p>

      <div id="root"></div>
      <p id="activeFilters"></p>

      <!-- Loads YOUR javascript code -->
      <script src="script.js"></script>
    </main>

    <footer>
      <h2>
        This data has originally come from
        <a href="https://www.tvmaze.com" target="_blank">TVMaze.com</a>
      </h2>
    </footer>
  </body>
</html>
